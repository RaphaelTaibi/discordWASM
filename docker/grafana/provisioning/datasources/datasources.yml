apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "5s"

  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://localhost:9093
    editable: false