- name: Archive project for transfer
    run: |
      # On archive TOUT le contexte nécessaire au build Docker
      # (On ne compile pas sur GitHub, on laisse la VM le faire via Docker)
      tar -czvf deploy.tar.gz \
        --exclude='target' \
        --exclude='node_modules' \
        --exclude='.git' \
        .

    - name: Copy archive to Oracle VM
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ubuntu
        key: ${{ secrets.ORACLE_SSH_KEY }}
        source: "deploy.tar.gz"
        target: "/home/ubuntu" # On envoie à la racine de l'user

    - name: Extract, Build and Restart
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ORACLE_HOST }}
        username: ubuntu
        key: ${{ secrets.ORACLE_SSH_KEY }}
        script: |
          # 1. Extraction dans le dossier de travail
          mkdir -p ~/discordWASM
          tar -xzvf ~/deploy.tar.gz -C ~/discordWASM
          cd ~/discordWASM
          
          # 2. Injection des Secrets pour Docker Build
          export PRIMARY_PIN_HASH="${{ secrets.PRIMARY_PIN_HASH }}"
          export BACKUP_PIN_HASH="${{ secrets.BACKUP_PIN_HASH }}"
          
          # 3. Build et Relance
          # Le -E permet de passer les variables d'env à sudo pour Docker
          sudo -E docker compose up -d --build signaling-server
          
          # 4. Nettoyage
          sudo docker image prune -f
          rm ~/deploy.tar.gz