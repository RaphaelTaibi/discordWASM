name: Deploy Signaling Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Binary (Heavy lifting on GitHub)
        # On passe les secrets ici pour la macro env!() au moment de la compilation
        env:
          PRIMARY_PIN_HASH: ${{ secrets.PRIMARY_PIN_HASH }}
          BACKUP_PIN_HASH: ${{ secrets.BACKUP_PIN_HASH }}
        run: cargo build --release -p signaling-server

      - name: Prepare Deployment Package
        run: |
          # On déplace le binaire au même niveau que le Dockerfile pour le contexte Docker
          cp target/release/signaling-server .
          tar -czvf deploy.tar.gz \
            docker-compose.yml \
            Dockerfile \
            signaling-server

      - name: Copy to Oracle VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            mkdir -p ~/discordWASM
            tar -xzvf ~/deploy.tar.gz -C ~/discordWASM
            cd ~/discordWASM
            
            # Ici, docker build sera instantané car le binaire est déjà là
            sudo docker compose up -d --build signaling-server
            
            rm ~/deploy.tar.gz