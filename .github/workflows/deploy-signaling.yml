name: Deploy Signaling Server

on:
  push:
    branches:
      - main
    paths:
      - 'packages/signaling-server/**'
      - '.github/workflows/deploy-signaling.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu # Cible pour Oracle ARM

      - name: Install ARM64 Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Binary (ARM64)
        env:
          PRIMARY_PIN_HASH: ${{ secrets.PRIMARY_PIN_HASH }}
          BACKUP_PIN_HASH: ${{ secrets.BACKUP_PIN_HASH }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target aarch64-unknown-linux-gnu -p signaling-server

      - name: Prepare Deployment Package
        run: |
          # On récupère le binaire dans le dossier de la target spécifique
          cp target/aarch64-unknown-linux-gnu/release/signaling-server .
          tar -czvf deploy.tar.gz \
            docker-compose.yml \
            Dockerfile \
            signaling-server

      - name: Copy to Oracle VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # 1. Préparation
            mkdir -p ~/discordWASM
            
            # 2. Nettoyage de l'ancien binaire (pour éviter les conflits de format)
            rm -f ~/discordWASM/signaling-server
            
            # 3. Extraction
            tar -xzvf ~/deploy.tar.gz -C ~/discordWASM
            cd ~/discordWASM
            
            # 4. Arrêt de l'ancien conteneur
            sudo docker compose down
            
            # 5. Relance Docker (Build instantané car binaire présent)
            sudo docker compose up -d --build signaling-server
            
            # 6. Ménage
            rm ~/deploy.tar.gz
            sudo docker image prune -f