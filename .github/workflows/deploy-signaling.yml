name: Deploy Signaling Server + Monitoring

on:
  push:
    branches:
      - main
    paths:
      - 'packages/signaling-server/**'
      - '.github/workflows/deploy-signaling.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker/**'
  workflow_dispatch:

env:
  RUST_TOOLCHAIN: stable
  TARGET_PLATFORM: aarch64-unknown-linux-gnu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_PLATFORM }}

      - name: Install ARM64 Linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Binary (ARM64)
        env:
          PRIMARY_PIN_HASH: ${{ secrets.PRIMARY_PIN_HASH }}
          BACKUP_PIN_HASH: ${{ secrets.BACKUP_PIN_HASH }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ env.TARGET_PLATFORM }} -p signaling-server

      - name: Verify Binary
        run: |
          echo "=== Vérification du binaire ==="
          file target/${{ env.TARGET_PLATFORM }}/release/signaling-server
          ls -lh target/${{ env.TARGET_PLATFORM }}/release/signaling-server

      - name: Prepare Deployment Package
        run: |
          echo "Creating deployment package..."
          mkdir -p deploy-package
          cp target/${{ env.TARGET_PLATFORM }}/release/signaling-server deploy-package/
          cp Dockerfile deploy-package/
          cp docker-compose.yml deploy-package/
          cp -r docker deploy-package/
          cp .env.example deploy-package/.env.example 2>/dev/null || echo "No .env.example"
          tar -czvf deploy.tar.gz -C deploy-package .

      - name: Copy to Oracle VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            echo "=== Déploiement SFU + Monitoring ==="
            mkdir -p ~/discordWASM
            cd ~/discordWASM
            
            # Nettoyage et extraction
            rm -f signaling-server
            tar -xzvf ~/deploy.tar.gz
            rm ~/deploy.tar.gz

            # 1. Création du fichier .env pour le backend Rust
            echo "Chargement des secrets environnement..."
            cat > .env << ENVEOF
            PRIMARY_PIN_HASH="${{ secrets.PRIMARY_PIN_HASH }}"
            BACKUP_PIN_HASH="${{ secrets.BACKUP_PIN_HASH }}"
            SMTP_AUTH_PASSWORD="${{ secrets.SMTP_AUTH_PASSWORD }}"
            SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}"
            ENVEOF
            chmod 600 .env

            # 2. Injection des secrets dans Alertmanager (CORRECTION ERREUR CONFIG)
            # On utilise '|' car les URLs contiennent des '/'
            echo "Patching Alertmanager config..."
            sed -i "s|REPLACE_SMTP_USER|${{ secrets.SMTP_EMAIL }}|g" docker/alertmanager.yml
            sed -i "s|REPLACE_SMTP_PASSWORD|${{ secrets.SMTP_AUTH_PASSWORD }}|g" docker/alertmanager.yml
            sed -i "s|REPLACE_SLACK_WEBHOOK|${{ secrets.SLACK_WEBHOOK_URL }}|g" docker/alertmanager.yml
            sed -i "s|REPLACE_DOMAIN|${{ secrets.DOMAIN }}|g" docker/alertmanager.yml

            echo "Relance des services Docker..."
            sudo docker compose --env-file .env down || true
            sudo docker compose --env-file .env build --no-cache signaling-server
            sudo docker compose --env-file .env up -d

            echo "Attente du démarrage des services (30s)..."
            sleep 30

            echo "=== Vérification des services ==="
            # Backend
            if curl -fk --max-time 10 https://localhost:3001/health; then
              echo "✅ Signaling Server: OK"
            else
              echo "❌ Signaling Server: FAILED"
              sudo docker compose --env-file .env logs --tail=50 signaling-server
              exit 1
            fi

            # Prometheus
            if curl -s --max-time 10 http://localhost:9090/-/healthy | grep -q "Prometheus Server is Healthy"; then
              echo "✅ Prometheus: OK"
            else
              echo "❌ Prometheus: FAILED"
              sudo docker compose --env-file .env logs --tail=50 prometheus
              exit 1
            fi

            # Grafana
            if curl -s --max-time 10 http://localhost:3000/api/health | grep -q "ok"; then
              echo "✅ Grafana: OK"
            else
              echo "❌ Grafana: FAILED"
              sudo docker compose --env-file .env logs --tail=50 grafana
              exit 1
            fi

            # Alertmanager
            if curl -s --max-time 10 http://localhost:9093/-/healthy | grep -q "Healthy"; then
              echo "✅ Alertmanager: OK"
            else
              echo "❌ Alertmanager: FAILED"
              sudo docker compose --env-file .env logs --tail=50 alertmanager
              exit 1
            fi

            echo "=== Nettoyage Docker ==="
            sudo docker image prune -f
            echo "🚀 Déploiement réussi !"

  notify:
    needs: build-and-deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            :robot: Déploiement SFU + Monitoring
            :rocket: *Statut:* ${{ job.status }}
            :book: *Commit:* ${{ github.event.head_commit.message }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}