name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

# Required so `tauri-action` can create the GitHub Release and upload bundles
# via the default GITHUB_TOKEN. The repo Settings → Actions → General →
# "Workflow permissions" must also be set to "Read and write permissions",
# otherwise this declaration cannot elevate the token (org/repo policy caps it).
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run Tauri/Desktop Rust tests
        run: cargo test -p desktop --verbose

      - name: Run core-wasm Rust tests
        run: cargo test -p core-wasm --verbose

      - name: Install dependencies
        env:
          VITE_SIGNALING_URL: ${{ secrets.VITE_SIGNALING_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: pnpm install

      - name: Run frontend tests (Vitest)
        run: pnpm --filter desktop test:run

  publish-tauri:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM package
        run: |
          cd packages/core-wasm
          wasm-pack build --target web --out-dir ../../apps/desktop/src/pkg

      - name: Install dependencies
        env:
          VITE_SIGNALING_URL: ${{ secrets.VITE_SIGNALING_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: pnpm install

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SIGNALING_URL: ${{ secrets.VITE_SIGNALING_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          PRIMARY_PIN_HASH: ${{ secrets.PRIMARY_PIN_HASH }}
          BACKUP_PIN_HASH: ${{ secrets.BACKUP_PIN_HASH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Void ${{ github.ref_name }}"
          releaseBody: "Mise à jour automatique."
          releaseDraft: false
          prerelease: false
          projectPath: ./apps/desktop
          includeUpdaterJson: true
          args: ${{ matrix.args }}
