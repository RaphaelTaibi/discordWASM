services:
  signaling-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PRIMARY_PIN_HASH: ${PRIMARY_PIN_HASH}
        BACKUP_PIN_HASH: ${BACKUP_PIN_HASH}
    image: signaling-server
    container_name: signaling-live
    network_mode: "host" # ⚠️ Crucial pour WebRTC UDP
    restart: always
    volumes:
      - /home/ubuntu/secrets/primary.pem:/app/cert.pem:ro
      - /home/ubuntu/secrets/primary.key:/app/key.pem:ro
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    network_mode: "host" # Permet d'accéder à localhost:9100 pour node-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    depends_on:
      - signaling-server

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    depends_on:
      - prometheus
    networks:
      - discordwasm-network

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - discordwasm-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    network_mode: "host"
    restart: unless-stopped

# Déclaration des volumes (Noms identiques aux services)
volumes:
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local

# Déclaration du réseau
networks:
  discordwasm-network:
    driver: bridge