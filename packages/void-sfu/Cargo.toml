[package]
name = "void-sfu"
version = "0.1.0"
edition = "2024"
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Domain-agnostic Selective Forwarding Unit (SFU) library built on webrtc-rs."

[dependencies]
webrtc = "0.17.1"
tokio = { version = "1.0", features = ["sync", "rt", "macros", "time"] }
async-trait = "0.1"
bytes = "1"
thiserror = "1.0"
tracing = "0.1"
dashmap = "6.1.0"
parking_lot = "0.12"


